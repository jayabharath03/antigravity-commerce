spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} # defaults to H2 dev; set SPRING_PROFILES_ACTIVE=prod for PostgreSQL
  application:
    name: antigravity-commerce

  jpa:
    hibernate:
      ddl-auto: validate # Flyway handles schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970} # 256-bit hex for HMAC-SHA256, override in prod
  expiration: 900000 # 15 minutes in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds
