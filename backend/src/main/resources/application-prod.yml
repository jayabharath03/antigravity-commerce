# Real PostgreSQL profile (used for local persistence AND deployment).
# Activate with:  SPRING_PROFILES_ACTIVE=prod
# All values come from environment variables so no secrets are ever committed.
spring:
  datasource:
    url: ${DB_URL}            # e.g. jdbc:postgresql://<host>:5432/<database>
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate      # Flyway owns the schema; JPA only validates it
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
